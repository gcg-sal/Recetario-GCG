<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1C4656">
<title>Recetario GCG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f5f7;--surface:#fff;--surface2:#e4eef2;
  --accent:#007B82;--accent2:#1C4656;--accent3:#51B0B6;
  --gold:#C9A571;
  --text:#1C4656;--text2:#2e6070;--text3:#7a9fad;
  --border:#CEDFE7;--r:14px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:sans-serif;overflow:hidden}

/* ── LOGIN ── */
#login-view{position:fixed;inset:0;background:var(--accent2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:24px}
#login-view.hidden{display:none}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo img{height:52px;object-fit:contain}
.login-logo h1{color:#fff;font-size:20px;font-weight:700;margin-top:10px;letter-spacing:.5px}
.login-logo p{color:rgba(255,255,255,0.6);font-size:13px;margin-top:4px}
.login-card{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:340px}
.login-card h2{font-size:15px;font-weight:700;color:var(--accent2);margin-bottom:16px;text-align:center}
.inp-group{margin-bottom:14px}
.inp-group label{display:block;font-size:12px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.inp-group input{width:100%;height:46px;border:1.5px solid var(--border);border-radius:10px;padding:0 14px;font-size:17px;color:var(--text);background:var(--surface2);outline:none;-webkit-appearance:none}
.inp-group input:focus{border-color:var(--accent);background:#fff}
.login-btn{width:100%;height:48px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px}
.login-btn:active{background:var(--accent2)}
.login-error{color:#e74c3c;font-size:12px;text-align:center;margin-top:8px;min-height:18px}
.login-sup-btn{background:none;border:none;color:rgba(255,255,255,0.5);font-size:12px;margin-top:18px;cursor:pointer;font-family:sans-serif}
.login-sup-btn:active{color:#fff}

/* PIN pad (paso 2) */
.login-step{display:none}
.login-step.active{display:block}
.pin-display{display:flex;justify-content:center;gap:12px;margin:16px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--accent2);background:transparent;transition:background .1s}
.pin-dot.filled{background:var(--accent2)}
.numpad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.nkey{height:52px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);font-size:20px;font-weight:600;color:var(--accent2);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.nkey:active{background:var(--accent2);color:#fff}
.nkey.empty{background:transparent;border-color:transparent;cursor:default}
.nkey.del{font-size:16px}
.login-back{background:none;border:none;color:var(--text3);font-size:12px;margin-top:12px;cursor:pointer;display:block;width:100%;text-align:center}

/* ── HEADER ── */
.hdr{background:var(--accent2);padding:12px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-logo{height:34px;object-fit:contain}
.hdr-divider{width:1px;height:26px;background:rgba(255,255,255,0.3)}
.hdr-title{color:#fff;font-size:15px;font-weight:600;flex:1;opacity:.9}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-user{color:rgba(255,255,255,0.8);font-size:12px;cursor:pointer;background:rgba(255,255,255,0.12);padding:4px 10px;border-radius:20px;border:none}
.hdr-count{color:rgba(255,255,255,0.55);font-size:11px}

/* ── LIST VIEW ── */
#list-view{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto}
.search-bar{background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;height:42px;padding:0 12px 0 38px;border:1.5px solid var(--border);border-radius:21px;font-size:15px;background:var(--surface2);color:var(--text);outline:none;-webkit-appearance:none}
.search-wrap input:focus{border-color:var(--accent);background:#fff}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.src-btn{height:42px;padding:0 14px;border:1.5px solid var(--border);border-radius:21px;background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap}
.src-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-drawer{background:var(--surface);border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .25s ease;flex-shrink:0}
.filter-drawer.open{max-height:180px}
.chips{padding:10px 14px;display:flex;flex-wrap:wrap;gap:7px;overflow-y:auto;max-height:180px}
.chip{padding:6px 13px;border-radius:18px;font-size:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.list-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px}
.res-bar{font-size:12px;color:var(--text3);padding:2px 2px 8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(min-width:580px){.grid{grid-template-columns:1fr 1fr 1fr}}
@media(min-width:800px){.grid{grid-template-columns:1fr 1fr 1fr 1fr}}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:13px;cursor:pointer;transition:transform .1s;border-left:3px solid var(--accent3)}
.card:active{transform:scale(.97)}
.card-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:5px}
.card-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(0,123,130,0.1);color:var(--accent);margin-bottom:4px}
.card-meta{font-size:11px;color:var(--text3)}
.empty{text-align:center;padding:50px 20px;color:var(--text3);grid-column:1/-1}

/* ── DETAIL VIEW ── */
#detail-view{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);max-width:900px;margin:0 auto;left:0;right:0}
#detail-view.open{transform:translateX(0)}
.d-hdr{background:var(--accent2);padding:14px 16px;display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
.back{background:rgba(255,255,255,0.18);border:none;color:#fff;width:36px;height:36px;border-radius:9px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.d-title{color:#fff;font-size:15px;font-weight:700;line-height:1.35}
.d-src{color:rgba(255,255,255,0.65);font-size:12px;margin-top:2px}
.d-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.scale-box{background:var(--surface);border-radius:var(--r);padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.box-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:9px}
.qty-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;flex-wrap:wrap}
.qty-ctrl{display:flex;align-items:center;background:var(--surface2);border-radius:21px;border:1.5px solid var(--border);overflow:hidden}
.qty-btn{width:42px;height:42px;border:none;background:transparent;color:var(--accent);font-size:26px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-inp{width:64px;height:42px;border:none;background:transparent;text-align:center;font-size:17px;font-weight:700;color:var(--text);outline:none;-webkit-appearance:none}
.unit-row{display:flex;gap:6px;flex-wrap:wrap}
.utab{padding:8px 13px;border-radius:19px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s}
.utab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:var(--surface);border-radius:11px;padding:11px;border:1px solid var(--border);text-align:center}
.metric-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.metric-val{font-size:16px;font-weight:700;color:var(--accent2);line-height:1.2}
.metric-sub{font-size:10px;color:var(--text3)}
.ing-box{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.ing-hdr{padding:10px 14px;background:var(--accent2);border-bottom:1px solid var(--border);font-size:11px;color:rgba(255,255,255,0.8);text-transform:uppercase;letter-spacing:.7px;display:flex;justify-content:space-between}
.ing-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
.ing-row:last-child{border-bottom:none}
.ing-row:nth-child(even){background:#f4f9fb}
.ing-name{flex:1;font-size:13px;color:var(--text);padding-right:8px;line-height:1.3}
.ing-right{text-align:right;flex-shrink:0}
.ing-base{font-size:11px;color:var(--text3)}
.ing-scaled{font-size:14px;font-weight:700;color:var(--accent)}
.ing-lb{font-size:10px;color:var(--text3)}

/* ── ADMIN PANEL ── */
#admin-view{position:fixed;inset:0;background:var(--bg);z-index:150;display:none;flex-direction:column}
#admin-view.open{display:flex}
.admin-hdr{background:var(--accent2);padding:14px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.admin-hdr h2{color:#fff;font-size:16px;font-weight:700;flex:1}
.admin-close{background:rgba(255,255,255,0.18);border:none;color:#fff;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:18px}
.admin-body{flex:1;overflow-y:auto;padding:14px}
.admin-stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.stat-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--accent2)}
.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.log-table{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-top:10px}
.log-row{display:flex;align-items:flex-start;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px}
.log-row:last-child{border-bottom:none}
.log-row:nth-child(even){background:#f4f9fb}
.log-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.log-info{flex:1;min-width:0}
.log-name{font-size:13px;font-weight:600;color:var(--text)}
.log-recipe{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-time{font-size:11px;color:var(--text3);flex-shrink:0;text-align:right}
.log-empty{padding:40px;text-align:center;color:var(--text3);font-size:14px}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--accent3);border-radius:2px}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-view">
  <div class="login-logo">
    <img id="login-logo-img" src="" alt="GCG">
    <h1>Recetario GCG</h1>
    <p>Identificate para continuar</p>
  </div>
  <div class="login-card">
    <!-- Paso 1: código -->
    <div class="login-step active" id="step1">
      <h2>Código de Empleado</h2>
      <div class="inp-group">
        <label>Código</label>
        <input id="inp-codigo" type="number" placeholder="Ej: 281" autocomplete="off" inputmode="numeric">
      </div>
      <button class="login-btn" onclick="goPin()">Continuar →</button>
      <div class="login-error" id="err1"></div>
    </div>
    <!-- Paso 2: PIN empleado -->
    <div class="login-step" id="step2">
      <h2 id="pin-nombre">Ingresa tu PIN</h2>
      <div class="pin-display">
        <div class="pin-dot" id="pd0"></div>
        <div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div>
        <div class="pin-dot" id="pd3"></div>
      </div>
      <div class="login-error" id="err2"></div>
      <div class="numpad" id="numpad"></div>
      <button class="login-back" onclick="goStep1()">← Cambiar código</button>
    </div>
    <!-- Paso 3: PIN supervisor -->
    <div class="login-step" id="step3">
      <h2>Acceso Supervisor</h2>
      <div class="pin-display">
        <div class="pin-dot" id="sp0"></div>
        <div class="pin-dot" id="sp1"></div>
        <div class="pin-dot" id="sp2"></div>
        <div class="pin-dot" id="sp3"></div>
      </div>
      <div class="login-error" id="err3"></div>
      <div class="numpad" id="suppad"></div>
      <button class="login-back" onclick="goStep1()">← Volver</button>
    </div>
  </div>
  <button class="login-sup-btn" onclick="goSup()">Acceso Supervisor ›</button>
</div>

<!-- ═══ MAIN ═══ -->
<div id="list-view">
  <div class="hdr">
    <img class="hdr-logo" id="hdr-logo-img" src="" alt="GCG">
    <div class="hdr-divider"></div>
    <span class="hdr-title">Recetario GCG</span>
    <div class="hdr-right">
      <button class="hdr-user" id="hdr-user" onclick="onUserClick()"></button>
      <span class="hdr-count" id="hcount"></span>
    </div>
  </div>
  <div class="search-bar">
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input id="search" type="search" placeholder="Buscar receta o ingrediente…" autocomplete="off" oninput="doFilter()">
    </div>
    <button class="src-btn" id="src-btn" onclick="toggleDrawer()">⚙ Fuente</button>
  </div>
  <div class="filter-drawer" id="drawer">
    <div class="chips" id="chips"></div>
  </div>
  <div class="list-scroll">
    <div class="res-bar" id="res-bar"></div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- ═══ DETAIL ═══ -->
<div id="detail-view">
  <div class="d-hdr">
    <button class="back" onclick="closeDetail()">←</button>
    <div>
      <div class="d-title" id="d-name"></div>
      <div class="d-src" id="d-src"></div>
    </div>
  </div>
  <div class="d-scroll">
    <div class="scale-box">
      <div class="box-label">Número de porciones</div>
      <div class="qty-row">
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="chg(-1)">−</button>
          <input class="qty-inp" id="qty" type="number" value="1" min="1" step="1" oninput="recalc()">
          <button class="qty-btn" onclick="chg(1)">+</button>
        </div>
        <div class="unit-row" id="utabs"></div>
      </div>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-lbl">Factor</div><div class="metric-val" id="m-factor">1.000×</div></div>
      <div class="metric"><div class="metric-lbl">Rendimiento</div><div class="metric-val" id="m-rend">—</div><div class="metric-sub" id="m-udm"></div></div>
      <div class="metric"><div class="metric-lbl">Ingredientes</div><div class="metric-val" id="m-ing">—</div></div>
    </div>
    <div class="ing-box">
      <div class="ing-hdr"><span>Ingrediente</span><span>Base → Escalado</span></div>
      <div id="ing-list"></div>
    </div>
  </div>
</div>

<!-- ═══ ADMIN ═══ -->
<div id="admin-view">
  <div class="admin-hdr">
    <h2>📋 Panel de Control</h2>
    <button class="admin-close" onclick="closeAdmin()">✕</button>
  </div>
  <div class="admin-body">
    <div class="admin-stats" id="admin-stats"></div>
    <div class="log-table" id="log-table"></div>
  </div>
</div>

let foundUser = null;

// ── LOGIN ──
function showStep(n){
  ['step1','step2','step3'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle('active', i===n-1);
  });
}

function goPin(){
  const codigo = document.getElementById('inp-codigo').value.trim();
  foundUser = USERS.find(u=>u.codigo===codigo);
  if(!foundUser){document.getElementById('err1').textContent='Código no encontrado';return;}
  document.getElementById('err1').textContent='';
  document.getElementById('pin-nombre').textContent='Hola, '+foundUser.nombre.split(' ')[0]+'!';
  pinEntered='';
  updatePinDisplay('pd',pinEntered);
  buildNumpad('numpad', enterPin, delPin);
  showStep(2);
}

function goStep1(){
  pinEntered=''; supPinEntered='';
  document.getElementById('inp-codigo').value='';
  document.getElementById('err1').textContent='';
  document.getElementById('err2').textContent='';
  document.getElementById('err3').textContent='';
  showStep(1);
}

function goSup(){
  supPinEntered='';
  updatePinDisplay('sp',supPinEntered);
  buildNumpad('suppad', enterSupPin, delSupPin);
  showStep(3);
}

function updatePinDisplay(prefix, pin){
  for(let i=0;i<4;i++){
    document.getElementById(prefix+i).classList.toggle('filled', i<pin.length);
  }
}

function buildNumpad(containerId, enterFn, delFn){
  const pad = document.getElementById(containerId);
  pad.innerHTML='';
  ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{
    const btn=document.createElement('div');
    btn.className='nkey'+(k===''?' empty':k==='⌫'?' del':'');
    btn.textContent=k;
    if(k!=='')btn.onclick=()=>k==='⌫'?delFn():enterFn(k);
    pad.appendChild(btn);
  });
}

function enterPin(k){
  if(pinEntered.length>=4)return;
  pinEntered+=k;
  updatePinDisplay('pd',pinEntered);
  if(pinEntered.length===4){
    if(pinEntered===foundUser.pin){
      doEnter(foundUser);
    } else {
      document.getElementById('err2').textContent='PIN incorrecto';
      setTimeout(()=>{pinEntered='';updatePinDisplay('pd',pinEntered);document.getElementById('err2').textContent='';},800);
    }
  }
}
function delPin(){pinEntered=pinEntered.slice(0,-1);updatePinDisplay('pd',pinEntered);}

function enterSupPin(k){
  if(supPinEntered.length>=4)return;
  supPinEntered+=k;
  updatePinDisplay('sp',supPinEntered);
  if(supPinEntered.length===4){
    if(supPinEntered===SUP_PIN){
      doEnter({codigo:'9999',pin:SUP_PIN,nombre:'Administrador GCG',initials:'AD',admin:true});
    } else {
      document.getElementById('err3').textContent='PIN incorrecto';
      setTimeout(()=>{supPinEntered='';updatePinDisplay('sp',supPinEntered);document.getElementById('err3').textContent='';},800);
    }
  }
}
function delSupPin(){supPinEntered=supPinEntered.slice(0,-1);updatePinDisplay('sp',supPinEntered);}

function doEnter(user){
  currentUser=user;
  document.getElementById('login-view').classList.add('hidden');
  document.getElementById('hdr-user').textContent=user.admin?'⚙ Admin':user.nombre.split(' ')[0];
  init();
}

function onUserClick(){
  if(currentUser&&currentUser.admin) openAdmin();
  else if(currentUser){ if(confirm('¿Cerrar sesión?')) location.reload(); }
}

// ═══ RECETAS ═══
const R=[{"name":"TORTILLA ESPAÑOLA CLÁSICA DE PAPA Y CEBOLLA","sheet":"SNACK BC SAL-MAD","source":"Avianca BC SAL-MAD","rendimiento_cant":50.0,"rendimiento_udm":"GR","ingredients":[{"name":"Huevo Entero","cant":24.0,"udm":"GR"},{"name":"Papa Pelada En Láminas","cant":22.0,"udm":"GR"},{"name":"Cebolla Blanca En Juliana","cant":7.0,"udm":"GR"},{"name":"Aceite De Oliva","cant":3.0,"udm":"GR"},{"name":"Sal","cant":0.5,"udm":"GR"},{"name":"Pimienta Negra Molida","cant":0.2,"udm":"GR"},{"name":"Perejil Fresco Picado","cant":0.3,"udm":"GR"}]}];

// ═══ FILTROS ═══
let filtered=R, active=new Set, cur=null, baseQty=1;
const sources=[...new Set(R.map(r=>r.source))].sort();

function init(){
  const ch=document.getElementById('chips');
  ch.innerHTML='';
  sources.forEach(s=>{
    const b=document.createElement('button');
    b.className='chip';b.textContent=s;
    b.onclick=()=>toggleChip(b,s);
    ch.appendChild(b);
  });
  render();
}

function toggleChip(b,s){active.has(s)?active.delete(s):active.add(s);b.classList.toggle('on');doFilter();}

function toggleDrawer(){
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('src-btn').classList.toggle('on');
}

function doFilter(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  filtered=R.filter(r=>{
    if(active.size&&!active.has(r.source))return false;
    if(!q)return true;
    if(r.name.toLowerCase().includes(q))return true;
    return r.ingredients.some(i=>i.name.toLowerCase().includes(q));
  });
  render();
}

function render(){
  const g=document.getElementById('grid');
  document.getElementById('hcount').textContent=R.length+' recetas';
  document.getElementById('res-bar').textContent=filtered.length===R.length?'':filtered.length+' resultado'+(filtered.length!==1?'s':'');
  g.innerHTML='';
  if(!filtered.length){g.innerHTML='<div class="empty">Sin resultados</div>';return;}
  filtered.forEach(r=>{
    const d=document.createElement('div');d.className='card';
    d.innerHTML='<div class="card-tag">'+r.source+'</div><div class="card-name">'+r.name+'</div><div class="card-meta">'+r.rendimiento_cant+' '+r.rendimiento_udm+' · '+r.ingredients.length+' ing.</div>';
    d.onclick=()=>openDetail(r);
    g.appendChild(d);
  });
}

// ═══ DETAIL ═══
function openDetail(r){
  cur=r;baseQty=r.rendimiento_cant;
  document.getElementById('d-name').textContent=r.name;
  document.getElementById('d-src').textContent=r.source+' · '+r.sheet;
  document.getElementById('qty').value=1;
  buildUnitTabs(r);recalc();
  document.getElementById('detail-view').classList.add('open');
  logRecipe(r);
}

function closeDetail(){document.getElementById('detail-view').classList.remove('open');}

function buildUnitTabs(r){
  const row=document.getElementById('utabs');row.innerHTML='';
  const udm=r.rendimiento_udm;
  const tabs=[{l:udm,m:1}];
  if(udm==='GR')tabs.push({l:'KG',m:0.001});
  if(udm==='ML')tabs.push({l:'LT',m:0.001});
  tabs.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='utab'+(i===0?' on':'');b.textContent=t.l;b.dataset.mult=t.m;
    b.onclick=()=>{[...document.querySelectorAll('.utab')].forEach(x=>x.classList.remove('on'));b.classList.add('on');recalc();};
    row.appendChild(b);
  });
}

function chg(d){
  const inp=document.getElementById('qty');
  let v=parseFloat(inp.value)||1;
  v=Math.max(1,Math.round(v+d));
  inp.value=v;recalc();
}

function recalc(){
  if(!cur)return;
  const mult=parseFloat(document.querySelector('.utab.on')?.dataset.mult||1);
  const porciones=parseFloat(document.getElementById('qty').value)||1;
  const factor=porciones;
  const rendTotal=(baseQty*porciones*mult);
  document.getElementById('m-factor').textContent=factor.toFixed(0)+'×';
  document.getElementById('m-rend').textContent=rendTotal.toLocaleString('es',{maximumFractionDigits:1});
  document.getElementById('m-udm').textContent=document.querySelector('.utab.on')?.textContent||cur.rendimiento_udm;
  document.getElementById('m-ing').textContent=cur.ingredients.length;
  const list=document.getElementById('ing-list');list.innerHTML='';
  cur.ingredients.forEach(ing=>{
    const scaled=ing.cant*factor;
    const row=document.createElement('div');row.className='ing-row';
    row.innerHTML='<div class="ing-name">'+ing.name+'</div><div class="ing-right"><div class="ing-base">'+ing.cant+' '+ing.udm+'</div><div class="ing-scaled">'+fmt(scaled)+'</div><div class="ing-lb">'+ing.udm+'</div></div>';
    list.appendChild(row);
  });
}

function fmt(n){
  if(n>=100)return n.toFixed(0);
  if(n>=10)return n.toFixed(1).replace(/\.0$/,'');
  if(n>=1)return n.toFixed(2).replace(/\.?0+$/,'');
  return n.toFixed(3).replace(/\.?0+$/,'');
}

// ═══ LOG ═══
async function logRecipe(r){
  if(!currentUser||currentUser.admin)return;
  const now=new Date();
  const entry={
    fecha:now.toLocaleDateString('es-SV'),
    hora:now.toLocaleTimeString('es-SV',{hour:'2-digit',minute:'2-digit'}),
    codigo:currentUser.codigo,
    nombre:currentUser.nombre,
    receta:r.name,
    fuente:r.source,
    ts:now.getTime()
  };
  // Local
  try{
    const ex=await window.storage.get(LOG_KEY);
    const logs=ex?JSON.parse(ex.value):[];
    logs.unshift(entry);if(logs.length>2000)logs.splice(2000);
    await window.storage.set(LOG_KEY,JSON.stringify(logs));
  }catch(e){}
  // Google Sheets
  try{
    fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(entry)});
  }catch(e){}
}

// ═══ ADMIN ═══
function openAdmin(){
  document.getElementById('admin-view').classList.add('open');
  renderAdmin();
}
function closeAdmin(){document.getElementById('admin-view').classList.remove('open');}

async function renderAdmin(){
  let logs=[];
  try{const ex=await window.storage.get(LOG_KEY);logs=ex?JSON.parse(ex.value):[];}catch(e){}
  const stats=document.getElementById('admin-stats');
  const usuarios=new Set(logs.map(l=>l.codigo)).size;
  stats.innerHTML=`
    <div class="stat-card"><div class="stat-num">${logs.length}</div><div class="stat-lbl">Consultas</div></div>
    <div class="stat-card"><div class="stat-num">${usuarios}</div><div class="stat-lbl">Usuarios</div></div>`;
  const tbl=document.getElementById('log-table');
  if(!logs.length){tbl.innerHTML='<div class="log-empty">Sin registros aún</div>';return;}
  tbl.innerHTML=logs.slice(0,100).map(l=>{
    const ini=l.nombre.split(' ').filter((_,i)=>i<2).map(w=>w[0]).join('').toUpperCase();
    return `<div class="log-row">
      <div class="log-avatar">${ini}</div>
      <div class="log-info"><div class="log-name">${l.nombre.split(' ').slice(0,2).join(' ')}</div><div class="log-recipe">${l.receta}</div></div>
      <div class="log-time">${l.fecha}<br>${l.hora}</div>
    </div>`;
  }).join('');
}

// Init login UI
buildNumpad('numpad', enterPin, delPin);
buildNumpad('suppad', enterSupPin, delSupPin);
document.getElementById('inp-codigo').addEventListener('keydown',e=>{if(e.key==='Enter')goPin();});
</script>
